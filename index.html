<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A letter to u</title>

  <!-- =======================
       CSS：样式（颜色/布局/横线/阴影）
       ======================= -->
  <style>
    :root { --w: 380px; --h: 240px; }

    /* 页面背景 */
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;

      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-text-size-adjust: 100%;

      background-color: #fff6d9;
      background-image: url("https://www.transparenttextures.com/patterns/floral-white.png");
    }

    /* 柔光装饰 */
    body::before,
    body::after{
      content:"";
      position:fixed;
      width:300px;
      height:300px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,182,213,0.30), transparent 70%);
      z-index:0;
      pointer-events:none;
    }
    body::before{ top:-110px; left:-110px; }
    body::after{ bottom:-120px; right:-120px; }

    .wrap{
      width:min(92vw, 520px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      position:relative;
      z-index:1;
    }

    h1{
      font-size:18px;
      font-weight:600;
      margin:0 0 18px;
      opacity:.85;
    }

    /* 信封区域 */
    .envelope-area{ display:grid; place-items:center; margin-bottom:16px; }
    .envelope{
      width: var(--w);
      height: var(--h);
      position:relative;
      cursor:pointer;
      user-select:none;
      outline:none;
      transition: transform .2s ease;
    }
    .envelope:active{ transform: scale(.98); }

    /* 信封主体 */
    .env-body{
      position:absolute; inset:0;
      background: #ffd6e7;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,.14);
      overflow:hidden;
    }

    /* 下三角 */
    .env-bottom{
      position:absolute; left:0; right:0; bottom:-1px; height:60%;
      background: linear-gradient(180deg,#ffffff,#f3f3f8);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      opacity:.95;
    }

    /* 两侧折角 */
    .env-left{
      position:absolute; inset:0;
      background: #ffcce0;
      clip-path: polygon(0 0, 50% 55%, 0 100%);
      opacity:.85;
    }
    .env-right{
      position:absolute; inset:0;
      background: #ffcce0;
      clip-path: polygon(100% 0, 50% 55%, 100% 100%);
      opacity:.85;
    }

    /* 盖子 */
    .env-flap{
      position:absolute; inset:0;
      background: #ffb6d5;
      clip-path: polygon(0 0, 100% 0, 50% 62%);
      transform-origin: top;
      transition: transform .6s ease;
      box-shadow: inset 0 -1px 0 rgba(0,0,0,.06);
    }

    /* 信纸 */
    .letter{
  position:absolute;
  left:14px; right:14px; bottom:14px;
  height:74%;
  padding:20px;
  overflow:auto;

  background-color:#ffffff;

  background-image: linear-gradient(
    to bottom,
    transparent 29px,
    rgba(0,0,0,0.10) 29px,
    rgba(0,0,0,0.10) 30px
  );
  background-size:100% 30px;
  background-repeat:repeat;
  background-attachment:local;
  background-origin:content-box;
  background-clip:content-box;

  border-radius:12px;
  box-shadow:0 12px 25px rgba(0,0,0,.12);

  z-index:2;
}

    /* 统一文字（更稳：等宽字体，不容易漂） */
    .letter h2,
    .letter p,
    #typewriter,
    #signature{
      margin:0;
      font-size:14px;
      line-height:30px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    #typewriter{
      white-space: pre-wrap; /* 让 \n 换行生效 */
    }

    #signature{
      opacity:.85;
      margin-top: 10px;
    }

    /* 打开后状态 */
    .open .env-flap{ transform: rotateX(180deg); }
    .open .letter{ transform: translateY(-6px); opacity:1; }
  </style>
</head>

<body>
  <!-- =======================
       HTML：结构（页面有什么）
       ======================= -->
  <div class="wrap">
    <h1>click to open</h1>

    <div class="envelope-area">
      <div class="envelope" id="env" role="button" tabindex="0" aria-label="open letter">
        <div class="env-body"></div>
        <div class="env-left"></div>
        <div class="env-right"></div>
        <div class="env-bottom"></div>
        <div class="env-flap"></div>

        <div class="letter" id="letter">
          <h2>To Selin</h2>
          <p id="typewriter"></p>
          <p id="signature"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- =======================
       JS：功能（打开/打字/停顿/自动滚动）
       ======================= -->
  <script>
    const env = document.getElementById('env');
    const letter = document.getElementById('letter');
    const typeEl = document.getElementById('typewriter');
    const sigEl  = document.getElementById('signature');

    // 前半部分（正常速度）
    const textLines = [
      "I want to tell you how I truly feel.",
      "Before I met you, I didn't really believe in love.",
      "But being with you changed that.",
      "",
      "Since I met you, everything changed.",
      "Even games don't seem as fun anymore,",
      "and problems don't feel that difficult.",
      "I find myself thinking about you all the time.",
      "",
      "You've become really important to me.",
      "I like you — not just as a friend.",
      ""
    ];

    // 最后一句（减速 + 停顿）
    const finalLine = "So… can I stay by your side?";
    const signatureText = "- Tianhe Chen";

    let started = false;
    let lineIndex = 0;
    let charIndex = 0;

    const normalSpeed = 35;
    const slowSpeed = 80;

    function scrollToBottom() {
      letter.scrollTop = letter.scrollHeight;
    }

    function typeNext() {
      if (lineIndex >= textLines.length) {
        // 打完前面，停顿一下再打最后一句
        setTimeout(typeFinalLine, 800);
        return;
      }

      const line = textLines[lineIndex];

      if (charIndex < line.length) {
        typeEl.textContent += line.charAt(charIndex);
        charIndex++;
        scrollToBottom();
        setTimeout(typeNext, normalSpeed);
      } else {
        typeEl.textContent += "\n";
        lineIndex++;
        charIndex = 0;
        scrollToBottom();
        setTimeout(typeNext, normalSpeed);
      }
    }

    function typeFinalLine() {
      let i = 0;

      function step() {
        if (i < finalLine.length) {
          typeEl.textContent += finalLine.charAt(i);
          i++;
          scrollToBottom();
          setTimeout(step, slowSpeed);
        } else {
          typeEl.textContent += "\n";
          scrollToBottom();
          typeSignature();
        }
      }

      step();
    }

    function typeSignature() {
      let i = 0;

      function step() {
        if (i < signatureText.length) {
          sigEl.textContent += signatureText.charAt(i);
          i++;
          scrollToBottom();
          setTimeout(step, 40);
        }
      }

      step();
    }

    function openAndType() {
      env.classList.add('open'); // 自动打开用 add 更稳

      if (!started) {
        started = true;
        typeEl.textContent = "";
        sigEl.textContent = "";
        lineIndex = 0;
        charIndex = 0;
        typeNext();
      }
    }

    // 点击也能触发
    env.addEventListener('click', openAndType);

    // 进页面自动开始（延迟一点更有仪式感）
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(openAndType, 900);
    });
  </script>
</body>
</html>
