<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A letter to u</title>

  <style>
    :root { --w: 380px; --h: 240px; }

    /* 背景 */
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;

      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-text-size-adjust: 100%;

      background-color: #fff6d9;
      background-image: url("https://www.transparenttextures.com/patterns/floral-white.png");
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      width:300px;
      height:300px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,182,213,0.28), transparent 70%);
      z-index:0;
      pointer-events:none;
    }
    body::before{ top:-110px; left:-110px; }
    body::after{ bottom:-120px; right:-120px; }

    .wrap{
      width:min(92vw, 520px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      position:relative;
      z-index:1;
    }
    h1{
      font-size:18px;
      font-weight:600;
      margin:0 0 18px;
      opacity:.85;
    }

    /* 信封 */
    .envelope-area{ display:grid; place-items:center; }
    .envelope{
      width: var(--w);
      height: var(--h);
      position:relative;
      cursor:pointer;
      user-select:none;
      outline:none;
      transition: transform .2s ease;
    }
    .envelope:active{ transform: scale(.98); }

    .env-body{
      position:absolute; inset:0;
      background: #ffd6e7;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,.14);
      overflow:hidden;
      z-index:1;
    }
    .env-bottom{
      position:absolute; left:0; right:0; bottom:-1px; height:60%;
      background: linear-gradient(180deg,#ffffff,#f3f3f8);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      opacity:.95;
      z-index:2;
    }
    .env-left{
      position:absolute; inset:0;
      background: #ffcce0;
      clip-path: polygon(0 0, 50% 55%, 0 100%);
      opacity:.85;
      z-index:2;
    }
    .env-right{
      position:absolute; inset:0;
      background: #ffcce0;
      clip-path: polygon(100% 0, 50% 55%, 100% 100%);
      opacity:.85;
      z-index:2;
    }
    .env-flap{
      position:absolute; inset:0;
      background: #ffb6d5;
      clip-path: polygon(0 0, 100% 0, 50% 62%);
      transform-origin: top;
      transition: transform .6s ease;
      box-shadow: inset 0 -1px 0 rgba(0,0,0,.06);
      z-index:3;
    }

    /* 信纸：默认在里面(translateY 52px + opacity 0) */
    .letter{
      position:absolute;
      left:14px; right:14px; bottom:14px;
      height:74%;
      overflow:auto;

      border-radius:12px;
      background:#fff;
      box-shadow:0 12px 25px rgba(0,0,0,.12);

      /* 关键：初始隐藏状态 */
      transform: translateY(52px);
      opacity:0;
      transition: transform .7s ease .08s, opacity .4s ease .08s;

      z-index:4;
    }

    /* 纸张内部（横线和文字绑定） */
    .paper{
      position:relative;
      min-height:100%;
      padding:20px;
    }
    .lines{
      position:absolute;
      left:20px;
      right:20px;
      top:20px;
      bottom:20px;
      pointer-events:none;

      background-image: linear-gradient(
        to bottom,
        transparent 29px,
        rgba(0,0,0,0.10) 29px,
        rgba(0,0,0,0.10) 30px
      );
      background-size: 100% 30px;
      background-repeat: repeat;
      z-index:0;
    }
    .content{
      position:relative;
      z-index:1;

      font-size:14px;
      line-height:30px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .content h2,
    .content p,
    #typewriter,
    #signature{
      margin:0;
      font-size:14px;
      line-height:30px;
    }
    #typewriter{ white-space: pre-wrap; }
    #signature{ opacity:.85; margin-top:10px; }

    .spacer-line{ height:30px; }

    /* 打开状态 */
    .open .env-flap{ transform: rotateX(180deg); }
    .open .letter{ transform: translateY(-6px); opacity:1; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>click to open</h1>

    <div class="envelope-area">
      <div class="envelope" id="env" role="button" tabindex="0" aria-label="open letter">
        <div class="env-body"></div>
        <div class="env-left"></div>
        <div class="env-right"></div>
        <div class="env-bottom"></div>
        <div class="env-flap"></div>

        <div class="letter" id="letter">
          <div class="paper">
            <div class="lines"></div>
            <div class="content">
             
              <p id="typewriter"></p>
              <p id="signature"></p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const env = document.getElementById('env');
    const letter = document.getElementById('letter');
    const typeEl = document.getElementById('typewriter');
    const sigEl  = document.getElementById('signature');

    const textLines = [
      "To Selin",
      "",
      "I want to tell you how I truly feel.",
      "Before I met you, I didn't really believe in love.",
      "But being with you changed that.",
      "",
      "Since I met you, everything changed.",
      "Even games don't seem as fun anymore,",
      "and problems don't feel that difficult.",
      "I find myself thinking about you all the time.",
      "",
      "You've become really important to me.",
      "I like you — not just as a friend.",
      ""
    ];

    const signatureText = "- Tianhe Chen";

    let started = false;
    let lineIndex = 0;
    let charIndex = 0;

    const normalSpeed = 55;

    function scrollToBottom() {
      // 让滚动跟着文字走
      letter.scrollTop = letter.scrollHeight;
    }

    function typeNext() {
      if (lineIndex >= textLines.length) {
        // 前面打完，停顿一下再进入“最后一句”
        setTimeout(typeFinalLine, 800);
        return;
      }

      const line = textLines[lineIndex];

      if (charIndex < line.length) {
        typeEl.textContent += line.charAt(charIndex);
        charIndex++;
        scrollToBottom();
        setTimeout(typeNext, normalSpeed);
      } else {
        typeEl.textContent += "\n";
        lineIndex++;
        charIndex = 0;
        scrollToBottom();
        setTimeout(typeNext, normalSpeed);
      }
    }

    // 最后一句：So... 特别慢 + 停顿 + 更慢
    function typeFinalLine() {
      const firstPart = "So...";
      const secondPart = " can I stay by your side?";

      let i = 0;

      function typeFirst() {
        if (i < firstPart.length) {
          typeEl.textContent += firstPart.charAt(i);
          i++;
          scrollToBottom();
          setTimeout(typeFirst, 180); // So... 更慢
        } else {
          setTimeout(typeSecond, 1200); // So... 后停更久
        }
      }

      function typeSecond() {
        let j = 0;
        function step() {
          if (j < secondPart.length) {
            typeEl.textContent += secondPart.charAt(j);
            j++;
            scrollToBottom();
            setTimeout(step, 150); // 后半句也慢
          } else {
            typeEl.textContent += "\n";
            scrollToBottom();
            typeSignature();
          }
        }
        step();
      }

      typeFirst();
    }

    function typeSignature() {
      let i = 0;
      function step() {
        if (i < signatureText.length) {
          sigEl.textContent += signatureText.charAt(i);
          i++;
          scrollToBottom();
          setTimeout(step, 45);
        }
      }
      step();
    }

    function openAndType() {
      env.classList.toggle('open');

      // 只在“第一次打开”时开始打字
      if (env.classList.contains('open') && !started) {
        started = true;
        typeEl.textContent = "";
        sigEl.textContent = "";
        lineIndex = 0;
        charIndex = 0;
        typeNext();
      }
    }

    env.addEventListener('click', openAndType);

    // 可选：键盘回车也能打开（电脑端）
    env.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openAndType();
      }
    });
  </script>
</body>
</html>
